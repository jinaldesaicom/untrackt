<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - UnTrackt</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f9fafb;
        color: #111827;
        padding: 1rem;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #111827; color: #f3f4f6; }
        .card { background: #1f2937; border-color: #374151; }
      }
      .card {
        text-align: center;
        max-width: 420px;
        padding: 2.5rem 2rem;
        border-radius: 1rem;
        border: 1px solid #e5e7eb;
        background: #fff;
      }
      .icon { font-size: 3rem; margin-bottom: 1rem; }
      h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.75rem; color: #777; }
      p { font-size: 0.875rem; color: #9ca3af; line-height: 1.6; margin-bottom: 1.5rem; }
      @media (prefers-color-scheme: light) {
        h1 { color: #000; }
        p { color: #4b5563; }
      }
      button {
        background: #4f46e5; color: #fff; border: none; padding: 0.625rem 1.5rem;
        border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; cursor: pointer;
      }
      button:hover { background: #4338ca; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📡</div>
      <h1>You're offline</h1>
      <p>UnTrackt needs an internet connection to load new pages. Check your connection and try again. Pages you've already visited may still be available.</p>
      <button onclick="location.reload()">Retry</button>
      <a href="/" style="display:inline-block;margin-top:0.75rem;color:#4f46e5;font-size:0.875rem;font-weight:500;text-decoration:none;">Go to Home</a>
    </div>
  </body>
</html>
